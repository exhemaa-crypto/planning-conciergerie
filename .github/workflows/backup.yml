name: Sauvegarde automatique

on:
  schedule:
    - cron: '0 3 * * *'   # tous les jours à 3h (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Configurer Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Générer la sauvegarde
        run: node backup.js
      - name: Committer la sauvegarde
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@planning-conciergerie"
          git add backups/
          git diff --staged --quiet || git commit -m "Sauvegarde automatique $(date +%F)"
          git push
